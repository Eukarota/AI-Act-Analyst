# Boussole CI/CD pipeline.
#
# Stages:
#   lint    -> ruff, ruff format check, mypy
#   test    -> unit + grounding + rules + conformance + agent + api + frontend
#              + eval smoke + eval gold (gates the rest of the pipeline)
#   build   -> backend + frontend container images, pushed to the project registry
#   deploy  -> kustomize apply to the OVH Kapsule cluster, manual trigger
#
# A failed eval_gold (or any earlier test stage) blocks build, which blocks deploy.
# The deploy job is manual on main, never automatic, never on feature branches.

stages:
  - lint
  - test
  - build
  - deploy

variables:
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.uv-cache"
  PYTHON_VERSION: "3.11"
  REGISTRY_BACKEND: "$CI_REGISTRY_IMAGE/backend"
  REGISTRY_FRONTEND: "$CI_REGISTRY_IMAGE/frontend"
  DOCKER_HOST: tcp://docker:2375
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

default:
  image: python:3.11-slim
  before_script:
    - pip install --quiet uv
    - uv sync --all-extras
  cache:
    key: uv-$CI_COMMIT_REF_SLUG
    paths:
      - .uv-cache/

lint:
  stage: lint
  script:
    - uv run ruff check .
    - uv run ruff format --check .

type:
  stage: lint
  script:
    - uv run mypy backend regulations tests eval

unit:
  stage: test
  script:
    - uv run pytest -m "not integration and not eval"

grounding:
  stage: test
  script:
    - uv run pytest tests/grounding -v

rules:
  stage: test
  script:
    - uv run pytest tests/rules -v

regulation_conformance:
  stage: test
  script:
    - uv run pytest tests/regulation_conformance -v

agent_e2e:
  stage: test
  script:
    - uv run pytest tests/agent tests/mcp_servers -v

api:
  stage: test
  script:
    - uv run pytest tests/api -v

frontend:
  stage: test
  image: node:22-bookworm-slim
  cache:
    key: npm-$CI_COMMIT_REF_SLUG
    paths:
      - frontend/node_modules
  before_script:
    - cd frontend
    - npm ci --no-audit --no-fund
  script:
    - npm run lint
    - npm run typecheck
    - npm run build

eval_smoke:
  stage: test
  script:
    - uv run python eval/run_eval.py --regulation ai_act --smoke --report

eval_gold:
  stage: test
  script:
    - uv run python eval/run_eval.py --regulation ai_act --gold --report
        --baseline eval/baselines/$(cat regulations/ai_act/corpus/VERSION).json
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - eval/reports/

corpus_diff:
  stage: test
  script:
    - uv run python scripts/reindex_and_eval.py --regulation ai_act
        --source local --target memory
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - regulations/ai_act/corpus/diff/
  allow_failure: true

.build_template: &build_template
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

build_backend:
  <<: *build_template
  script:
    - docker build
        --build-arg PYTHON_VERSION=3.11
        --tag "$REGISTRY_BACKEND:$CI_COMMIT_SHA"
        --tag "$REGISTRY_BACKEND:latest"
        .
    - docker push "$REGISTRY_BACKEND:$CI_COMMIT_SHA"
    - docker push "$REGISTRY_BACKEND:latest"

build_frontend:
  <<: *build_template
  script:
    - docker build
        --tag "$REGISTRY_FRONTEND:$CI_COMMIT_SHA"
        --tag "$REGISTRY_FRONTEND:latest"
        -f frontend/Dockerfile
        frontend
    - docker push "$REGISTRY_FRONTEND:$CI_COMMIT_SHA"
    - docker push "$REGISTRY_FRONTEND:latest"

deploy_prod:
  stage: deploy
  image: alpine/k8s:1.30.0
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  environment:
    name: prod
    url: https://boussole.broker
  before_script:
    - echo "$KUBECONFIG_PROD" | base64 -d > /tmp/kubeconfig
    - export KUBECONFIG=/tmp/kubeconfig
  script:
    - cd infra/k8s/overlays/prod
    - kustomize edit set image
        boussole-backend=$REGISTRY_BACKEND:$CI_COMMIT_SHA
        boussole-frontend=$REGISTRY_FRONTEND:$CI_COMMIT_SHA
    - kubectl apply -k .
    - kubectl rollout status deployment/boussole-backend -n boussole --timeout=180s
    - kubectl rollout status deployment/boussole-frontend -n boussole --timeout=180s
