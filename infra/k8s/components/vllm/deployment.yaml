apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  labels:
    app.kubernetes.io/name: vllm
    app.kubernetes.io/component: llm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        workload: vllm
      tolerations:
        - key: workload
          operator: Equal
          value: vllm
          effect: NoSchedule
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          imagePullPolicy: IfNotPresent
          args:
            - "--model"
            - "$(VLLM_MODEL_ID)"
            - "--max-model-len"
            - "8192"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
          env:
            - name: VLLM_MODEL_ID
              valueFrom:
                configMapKeyRef:
                  name: vllm-config
                  key: VLLM_MODEL_ID
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vllm-secrets
                  key: HF_TOKEN
                  optional: true
          ports:
            - name: http
              containerPort: 8000
          resources:
            requests:
              nvidia.com/gpu: 1
              cpu: "2"
              memory: 16Gi
            limits:
              nvidia.com/gpu: 1
              cpu: "8"
              memory: 32Gi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 300
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: model-cache
              mountPath: /root/.cache/huggingface
      volumes:
        - name: model-cache
          emptyDir:
            sizeLimit: 40Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-config
data:
  VLLM_MODEL_ID: mistralai/Mistral-7B-Instruct-v0.3
