apiVersion: apps/v1
kind: Deployment
metadata:
  name: boussole-frontend
  labels:
    app.kubernetes.io/name: boussole-frontend
    app.kubernetes.io/component: ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: boussole-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: boussole-frontend
    spec:
      automountServiceAccountToken: false
      containers:
        - name: frontend
          image: boussole-frontend:placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: BOUSSOLE_API_ORIGIN
              value: http://boussole-backend.boussole.svc.cluster.local
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: boussole-frontend
spec:
  selector:
    app.kubernetes.io/name: boussole-frontend
  ports:
    - name: http
      port: 80
      targetPort: 3000
  type: ClusterIP
