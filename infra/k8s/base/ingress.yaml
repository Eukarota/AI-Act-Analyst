apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: boussole
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - boussole.example
        - api.boussole.example
      secretName: boussole-tls
  rules:
    - host: boussole.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: boussole-frontend
                port:
                  number: 80
    - host: api.boussole.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: boussole-backend
                port:
                  number: 80
