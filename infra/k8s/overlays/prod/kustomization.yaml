apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: boussole

resources:
  - ../../base

images:
  - name: boussole-backend
    newName: registry.gitlab.com/ceres-broker/boussole/backend
    newTag: latest
  - name: boussole-frontend
    newName: registry.gitlab.com/ceres-broker/boussole/frontend
    newTag: latest

patches:
  - target:
      kind: Deployment
      name: boussole-backend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Ingress
      name: boussole
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: aiact.ceres.broker
      - op: replace
        path: /spec/tls/0/hosts/0
        value: aiact.ceres.broker

# Secrets are NEVER committed. Create the runtime secret with:
#
#   kubectl -n boussole create secret generic boussole-backend-secrets \
#     --from-literal=BOUSSOLE_DATABASE_URL="$(terraform -chdir=infra/terraform output -raw postgres_dsn)" \
#     --from-literal=BOUSSOLE_LLM_URL=https://api.mistral.ai \
#     --from-literal=BOUSSOLE_LLM_MODEL=mistral-large-latest \
#     --from-literal=MISTRAL_API_KEY=<key>
#
# For the self-hosted vLLM path (client missions), swap to:
#     --from-literal=BOUSSOLE_LLM_URL=http://vllm.boussole.svc.cluster.local:8000 \
#     --from-literal=BOUSSOLE_LLM_MODEL=mistralai/Mistral-7B-Instruct-v0.3 \
#     --from-literal=MISTRAL_API_KEY=
#
# Same backend image; the LLMProvider port hides the difference.
